name: Deploy to atlas

on:
  push:
    branches:
      - main

# miketineo.com is served from the atlas Hetzner VPS (nginx container behind the
# Cloudflare tunnel), not AWS S3/CloudFront. This workflow builds the static site
# and rsyncs it to /opt/miketineo.com/site on atlas. The deploy SSH key is locked
# down on the server to `rrsync` into that directory only (no shell access).

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build site (pages + blog)
        # build:audio is intentionally skipped: it calls AWS Polly, and the MP3s
        # are already committed under blog/audio/.
        run: |
          npm run build:pages
          npm run build:blog

      - name: Stage static site
        run: |
          set -euo pipefail
          rm -rf _deploy && mkdir -p _deploy/blog
          cp index.html about.html contact.html experience.html speaking.html \
             robots.txt sitemap.xml portrait.jpeg _deploy/
          cp -R css js assets _deploy/
          cp blog/*.html blog/posts.json _deploy/blog/
          cp -R blog/audio blog/images _deploy/blog/
          test -f _deploy/index.html
          echo "Staged $(find _deploy -type f | wc -l) files"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ATLAS_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.ATLAS_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to atlas (rsync)
        # Empty path after the colon = the rrsync-locked root (/opt/miketineo.com/site).
        # No --chmod: rrsync rejects it; source perms (644/755) are already correct.
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=20" \
            _deploy/ miguel@46.4.120.122:

      - name: Detect New Blog Post
        id: blog_check
        run: |
          # Check if a new blog post was added
          NEW_POSTS=$(git diff --name-only HEAD~1 HEAD | grep "^blog/posts/" || true)

          if [ -n "$NEW_POSTS" ]; then
            echo "new_post=true" >> $GITHUB_OUTPUT
            POST_FILE=$(echo "$NEW_POSTS" | head -1)
            POST_SLUG=$(basename "$POST_FILE" .md)
            echo "post_slug=$POST_SLUG" >> $GITHUB_OUTPUT
            echo "New blog post detected: $POST_SLUG"
          else
            echo "new_post=false" >> $GITHUB_OUTPUT
            echo "No new blog post in this push"
          fi

      - name: Blog Post Published Notification
        if: steps.blog_check.outputs.new_post == 'true'
        run: |
          POST_SLUG="${{ steps.blog_check.outputs.post_slug }}"
          POST_URL="https://miketineo.com/blog/${POST_SLUG}"

          echo "Blog Post Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Post: ${POST_SLUG}" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${POST_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify live: ${POST_URL}" >> $GITHUB_STEP_SUMMARY
          echo "2. Share on social media (optional)" >> $GITHUB_STEP_SUMMARY
          echo "3. Newsletter: a Buttondown draft was created by ./scripts/bear approve --yes at ship time — review and send from the Buttondown dashboard" >> $GITHUB_STEP_SUMMARY
          echo "4. Schedule send for next Tuesday" >> $GITHUB_STEP_SUMMARY

          echo "::notice title=Blog Post Published::New post live at ${POST_URL}"
